# ================== CONFIGURATION PHANTOM ==================
#
# provider: anthropic | openai | grok | gemini | ollama | mistral | deepseek
provider: "anthropic"

# model: leave empty to use the provider's default (as of 2026-03-15)
#   anthropic → claude-sonnet-4-6
#   openai    → gpt-5.4
#   grok      → grok-4-20-beta
#   gemini    → gemini-3.0-pro
#   ollama    → deepseek-r1:3.2  (local)
#   mistral   → mistral-large-latest
#   deepseek  → deepseek-chat-v3.2
model: ""

# API key — set via environment variable or generated by install.sh / install.ps1
# Anthropic : export ANTHROPIC_API_KEY=sk-ant-...
# OpenAI    : export OPENAI_API_KEY=sk-...
# Grok      : export XAI_API_KEY=xai-...
# Gemini    : export GEMINI_API_KEY=...
# Mistral   : export MISTRAL_API_KEY=...
# DeepSeek  : export DEEPSEEK_API_KEY=...
# Ollama    : no key needed (local)
api_key: ""

# Ollama only
ollama_host: "http://localhost:11434"

# Paths
log_dir: "logs"
scope_file: "scopes/current_scope.md"

# Behaviour
debug: true
autonomous: true
max_autonomous_turns: 50
pause_every_n_turns: 10

# Interactive mode — allow agent to use request_human_input tool and operator to
# respond at pause points. Set false for fully headless/CI execution.
interactive: true

# sqlmap default timeout in seconds — increase for complex or slow targets
sqlmap_timeout: 300

# Context compaction — tool results older than this many turns are truncated to
# 400 chars to prevent context overflow during long missions
context_compact_after: 5
