# ================== CONFIGURATION PHANTOM ==================
#
# provider: anthropic | openai | grok | gemini | ollama | mistral
provider: "anthropic"

# model: leave empty to use the provider's default
#   anthropic → claude-sonnet-4-6
#   openai    → gpt-4o
#   grok      → grok-2-latest
#   gemini    → gemini-1.5-pro
#   ollama    → llama3.1
#   mistral   → mistral-large-latest
model: ""

# API key — set via environment variable or generated by install.sh / install.ps1
# Anthropic : export ANTHROPIC_API_KEY=sk-ant-...
# OpenAI    : export OPENAI_API_KEY=sk-...
# Grok      : export XAI_API_KEY=xai-...
# Gemini    : export GEMINI_API_KEY=...
# Mistral   : export MISTRAL_API_KEY=...
# Ollama    : no key needed (local)
api_key: ""

# Ollama only
ollama_host: "http://localhost:11434"

# Paths
log_dir: "logs"
scope_file: "scopes/current_scope.md"

# Behaviour
debug: true
autonomous: true
max_autonomous_turns: 50
pause_every_n_turns: 10
